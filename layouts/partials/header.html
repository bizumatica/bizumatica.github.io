<header class="header">
  <div class="header__inner">
    <div class="header__logo-row">
      {{- /* Link da Logo apontando para a raiz absoluta inquebrável */ -}}
      <a href="{{ "/" | absURL }}" style="text-decoration: none; flex-shrink: 0;">
        <div class="logo-box">BIZUMÁTICA</div>
      </a>
      <div class="terminal-bars"></div>
    </div>

    <nav class="menu-nav" aria-label="Navegação Principal">
      <ul class="menu__inner">
        {{- /* Links corrigidos com absURL e acessibilidade injetada via ARIA */ -}}
        <li><a href="{{ "/linux/" | absURL }}" aria-label="Seção Linux">[ Linux ]</a></li>
        <li><a href="{{ "/foss/" | absURL }}" aria-label="Seção FOSS">[ FOSS ]</a></li>
        <li><a href="{{ "/matematica/" | absURL }}" aria-label="Seção Matemática">[ Matemática ]</a></li>
        <li><a href="{{ "/curadoria/" | absURL }}" aria-label="Seção Curadoria">[ Curadoria ]</a></li>
        <li><a href="{{ "/shell-scripting/" | absURL }}" aria-label="Seção Shell Scripting">[ Shell ]</a></li>
        <li><a href="{{ "/search/" | absURL }}" aria-label="Página de Busca">[ Buscar ]</a></li>
        <li><a href="{{ "/sobre/" | absURL }}" aria-label="Sobre o Autor">[ Sobre ]</a></li>
      </ul>
    </nav>
  </div>
</header>

<style>
/* Forçando a cor dourada original para garantir consistência em qualquer ambiente */
.header__logo-row {
    display: flex; 
    align-items: center; 
    width: 100%; 
    overflow: hidden;
}

.logo-box {
    background-color: #EEC35E !important;
    color: #000 !important;
    padding: 5px 12px;
    font-weight: bold;
    font-family: monospace;
    display: inline-block;
    text-transform: uppercase;
    margin-right: 10px;
    cursor: pointer;
}

.terminal-bars {
    flex-grow: 1;
    min-width: 30px; /* Garante que a barra nunca seja esmagada a zero no mobile */
    height: 25px;
    background-image: linear-gradient(to right, #EEC35E 1px, transparent 1px);
    background-size: 4px 100%;
}

.header__inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 20px 0;
}

.menu-nav { margin-top: 25px; width: 100%; }

.menu__inner {
    display: flex;
    flex-wrap: wrap !important; /* MUDANÇA CRÍTICA: Agora ele quebra para baixo se não houver espaço */
    list-style: none;
    padding: 0;
    margin: 0;
    justify-content: flex-start;
    gap: 10px 24px; 
}

.menu__inner li {
    flex: 0 0 auto; /* Impede que o navegador esmague ou encolha a largura dos links */
}

.menu__inner li a {
    color: #EEC35E !important;
    text-decoration: none;
    font-family: monospace;
    font-size: 1.1rem; /* Mantém o tamanho original intacto e legível */
    white-space: nowrap; /* Garante blindagem contra quebras internas do texto do link */
}

.menu__inner li a:hover {
    text-decoration: underline;
    filter: brightness(1.2);
}

/* Ativa o modo responsivo elástico apenas abaixo de desktops padrão */
@media (max-width: 960px) { /* Ajustado de 915px para 960px para dar margem de segurança */
    .menu__inner {
        flex-wrap: wrap; /* Permite a quebra organizada em telas pequenas */
        justify-content: flex-start;
        gap: 12px 15px;
    }
}

@media (max-width: 480px) {
    .menu__inner { gap: 15px; }
    .menu__inner li a { font-size: 1rem; }
}
</style>
