name: Pipeline de Deploy Bizumática (v5.2 - Cloud Compiler)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do Código-Fonte Limpo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Configurar Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1' # Travado na versão local
          extended: true

      - name: 🏗️ Compilar Site Estático
        run: hugo --gc --minify --cleanDestinationDir

      - name: ⚙️ Compliance Check Final (AdSense & SEO)
        run: |
          if [ ! -f "public/ads.txt" ]; then 
            echo "::error::ERRO: ads.txt foi perdido no build da nuvem!" && exit 1
          fi
          grep -q "Allow: /" public/robots.txt || { echo "::warning::Verifique a indexação no robots.txt"; }

      - name: 🟢 Configurar Node.js (Runtime Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔍 Indexar Motor de Busca Otimizado (Pagefind)
        run: npx --yes pagefind --site public

      - name: 📦 Upload de Artefato Nativo do GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 🚀 Deploy Direto no Edge (Deploy Sem Commit)
        id: deployment
        uses: actions/deploy-pages@v4
