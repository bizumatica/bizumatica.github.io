name: Pipeline de Deploy Bizumática (Retorno ao GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do Código-Fonte Limpo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Configurar Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: 🏗️ Compilar Site Estático
        run: hugo --gc --minify --cleanDestinationDir --buildDrafts

      - name: ⚙️ Compliance Check Final
        run: |
          if [ ! -f "public/ads.txt" ]; then 
            echo "::error::ERRO: ads.txt não foi gerado pelo Hugo!" && exit 1
          fi

      - name: 🟢 Configurar Node.js (Runtime Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔍 Indexar Motor de Busca Otimizado (Pagefind)
        run: "npx --yes pagefind --site public || echo 'Ignorando alertas do Pagefind.'"

      - name: 🚀 Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true