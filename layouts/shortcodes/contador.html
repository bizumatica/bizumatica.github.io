<span class="terminal-counter" id="bizu-counter-wrapper" style="display: none;">
  [ VISITAS: <span id="bizu-counter-value">------</span> ]
</span>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Evita contabilizar acessos durante testes locais
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        const wrapper = document.getElementById("bizu-counter-wrapper");
        const valueSpan = document.getElementById("bizu-counter-value");
        if (wrapper && valueSpan) {
            valueSpan.innerText = "DEV_MODE";
            valueSpan.style.color = "#ff5555";
            wrapper.style.display = "inline-block";
        }
        return;
    }

    // 2. Chave baseada no seu domínio de produção oficial
    const targetKey = "bizumatica.com.br";
    
    // Endpoint gerador de SVG indestrutível baseado no proxy do Seeyoufarm
    const svgEndpoint = `https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=${targetKey}&count_bg=%2316161e&title_bg=%2316161e&style=flat`;

    // Requisita o arquivo SVG em formato de texto isolado
    fetch(svgEndpoint)
        .then(response => {
            if (!response.ok) throw new Error("Falha ao ler o badge SVG");
            return response.text();
        })
        .then(svgText => {
            const valueSpan = document.getElementById("bizu-counter-value");
            
            // Expressão regular cirúrgica para capturar o último bloco de texto do SVG (onde fica o número)
            const matches = svgText.match(/<text[^>]*>([\d\s,.]+)<\/text>/g);
            
            if (matches && matches.length > 0) {
                // Pega a última ocorrência do elemento <text> que contém a contagem limpa
                const rawCount = matches[matches.length - 1].replace(/<\/?[^>]+(>|$)/g, "").trim();
                valueSpan.innerText = rawCount;
            } else {
                valueSpan.innerText = "ONLINE";
            }
            
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        })
        .catch(err => {
            console.error("[Contador Bizumática] Erro ao renderizar métricas:", err);
            const valueSpan = document.getElementById("bizu-counter-value");
            if (valueSpan) {
                valueSpan.innerText = "STANDBY";
                valueSpan.style.color = "#6272a4"; // Tom cinza Tokyo Night
            }
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        });
});
</script>

<style>
.terminal-counter {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    font-weight: bold;
    color: #ff9e3b; /* Laranja Oficial Tokyo Night */
    background: #16161e; /* Fundo Tokyo Night */
    padding: 3px 8px;
    border: 1px dashed #ff9e3b66;
    border-radius: 4px;
    letter-spacing: 0.5px;
    box-shadow: 0 0 10px rgba(255, 158, 59, 0.05);
}
</style>
