<header class="header">
  <div class="header__inner">
    <div class="header__logo-row">
      {{- /* Link da Logo apontando para a raiz absoluta inquebrável */ -}}
      <a href="{{ "/" | absURL }}" style="text-decoration: none; flex-shrink: 0;">
        <div class="logo-box">BIZUMÁTICA</div>
      </a>
      <!-- Div que renderiza o padrão serrilhado clássico de barras verticais -->
      <div class="terminal-bars"></div>
    </div>

    <nav class="menu-nav" aria-label="Navegação Principal">
      <ul class="menu__inner">
        {{- /* Links distribuídos simetricamente de ponta a ponta */ -}}
        <li><a href="{{ "/linux/" | absURL }}" aria-label="Seção Linux">[ Linux ]</a></li>
        <li><a href="{{ "/foss/" | absURL }}" aria-label="Seção FOSS">[ FOSS ]</a></li>
        <li><a href="{{ "/matematica/" | absURL }}" aria-label="Seção Matemática">[ Matemática ]</a></li>
        <li><a href="{{ "/curadoria/" | absURL }}" aria-label="Seção Curadoria">[ Curadoria ]</a></li>
        <li><a href="{{ "/shell-scripting/" | absURL }}" aria-label="Seção Shell Scripting">[ Shell ]</a></li>
        <li><a href="{{ "/search/" | absURL }}" aria-label="Página de Busca">[ Buscar ]</a></li>
      </ul>
    </nav>
  </div>
</header>

<style>
.header__logo-row {
    display: flex; 
    align-items: center; 
    width: 100%; 
    overflow: hidden;
}

.logo-box {
    background-color: #EEC35E !important;
    color: #000 !important;
    padding: 5px 12px;
    font-weight: bold;
    font-family: monospace;
    display: inline-block;
    text-transform: uppercase;
    margin-right: 10px;
    cursor: pointer;
}

/* AJUSTADO: Aumento vertical do serrilhado (FOTO: image_36d82b.png) */
.terminal-bars {
    flex-grow: 1;
    min-width: 40px;
    height: 32px; /* Aumentado verticalmente para dar mais presença ao serrilhado */
    /* Mantém o padrão pixel-perfect de linhas paralelas rígidas */
    background-image: linear-gradient(to right, #EEC35E 1px, transparent 1px);
    background-size: 4px 100%; 
    background-repeat: repeat-x;
    align-self: center; /* Garante que ele fique centralizado verticalmente com a logo */
}

.header__inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 20px 0;
}

.menu-nav { 
    margin-top: 25px; 
    width: 100%; 
}

.menu__inner {
    display: flex;
    flex-wrap: wrap !important; 
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
    /* Distribuição elástica e responsiva de ponta a ponta */
    justify-content: space-between; 
    gap: 12px 10px; 
}

.menu__inner li {
    flex: 0 1 auto;
    text-align: center;
}

.menu__inner li a {
    color: #EEC35E !important;
    text-decoration: none;
    font-family: monospace;
    font-size: 1.1rem; 
    white-space: nowrap; 
    display: inline-block;
    transition: filter 0.2s ease;
}

.menu__inner li a:hover {
    text-decoration: underline;
    filter: brightness(1.2);
}

/* Media Queries para adaptação elástica do espaço */
@media (max-width: 960px) {
    .menu__inner {
        justify-content: space-between; 
        gap: 14px 8px;
    }
}

@media (max-width: 640px) {
    .menu__inner {
        justify-content: space-around; 
        gap: 16px 10px;
    }
    .menu__inner li a { 
        font-size: 1.05rem; 
    }
}

@media (max-width: 480px) {
    .menu__inner { 
        justify-content: space-between;
        gap: 15px 5px; 
    }
    .menu__inner li a { 
        font-size: 0.95rem; 
    }
}
</style>
