<span class="terminal-counter" id="bizu-counter-wrapper">
  [ VISITAS: <span id="bizu-counter-value">
    <img id="bizu-svg-counter" src="" alt="Contando..." style="vertical-align: middle; display: inline-block; margin-top: -2px; filter: contrast(110%);" />
  </span> ]
</span>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const targetKey = "bizumatica.com.br";
    const imgElement = document.getElementById("bizu-svg-counter");

    // 1. Tratamento para ambiente de desenvolvimento local
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        if (imgElement) {
            // Remove a imagem e injeta o texto de dev direto
            const parent = imgElement.parentElement;
            parent.innerText = "DEV_MODE";
            parent.style.color = "#ff5555";
        }
        return;
    }

    // 2. Injeta a URL do SVG diretamente na imagem em produção
    // Customizado cirurgicamente com as cores do Tokyo Night (#16161e) para mesclar perfeitamente no seu box
    if (imgElement) {
        imgElement.src = `https://hitscounter.dev/api/count/incr/badge.svg?url=${targetKey}&count_bg=%2316161e&title_bg=%2316161e&title=&edge_flat=true&style=flat-square`;
    }
});
</script>

<style>
.terminal-counter {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    font-weight: bold;
    color: #ff9e3b; /* Laranja Oficial Tokyo Night */
    background: #16161e; /* Fundo Tokyo Night */
    padding: 3px 8px;
    border: 1px dashed #ff9e3b66;
    border-radius: 4px;
    letter-spacing: 0.5px;
    box-shadow: 0 0 10px rgba(255, 158, 59, 0.05);
    display: inline-block;
}
/* Estilização interna para forçar o SVG a herdar o comportamento estético do terminal */
#bizu-svg-counter {
    max-height: 14px;
    border: none !important;
    padding: 0 !important;
    background: transparent !important;
}
</style>
