<div class="bizu-categories-container" style="margin: 20px 0;">
  <span class="bizu-label" style="color: var(--theme-color); font-weight: bold; margin-right: 10px;">[ CATEGORIES ]:</span>
  <ul class="bizu-categories-list" style="display: inline-flex; flex-wrap: wrap; gap: 10px; list-style: none; padding: 0; margin: 0;">
    {{ range .Site.Taxonomies.categories }}
      <li>
        <a href="{{ "categories/" | relURL }}{{ .Page.Title | urlize }}" class="bizu-tag" 
           style="color: #00ffff; text-decoration: none; font-family: monospace; border: 1px solid #333; padding: 2px 8px; transition: 0.3s;">
          <span class="hash" style="color: var(--theme-color);">#</span>{{ .Page.Title }}
        </a>
      </li>
    {{ end }}
  </ul>
</div>

<style>
.bizu-tag:hover {
    background: rgba(0, 255, 255, 0.1);
    border-color: #00ffff !important;
}
</style>
