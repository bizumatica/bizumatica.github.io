name: Pipeline de Deploy Bizumática (Nativo)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissões estritas exigidas pelo novo GitHub Pages nativo
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que não haja dois deploys atropelando um ao outro
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Define o ambiente de deploy para o GitHub rastrear o link
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout do Código-Fonte
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Configurar Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: 🏗️ Compilar Site Estático
        run: hugo --gc --minify --cleanDestinationDir

      - name: ⚙️ Compliance Check Final
        run: |
          if [ ! -f "public/ads.txt" ]; then 
            echo "::error::ERRO: ads.txt não foi gerado pelo Hugo!" && exit 1
          fi

      - name: 🟢 Configurar Node.js (Runtime Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔍 Indexar Motor de Busca Otimizado (Pagefind)
        run: npx --yes pagefind --site public || echo 'Ignorando alertas do Pagefind.'

      # === A GRANDE MUDANÇA ESTÁ AQUI ===
      - name: 📦 Upload do Artefato (GitHub Pages Nativo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: 🚀 Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4