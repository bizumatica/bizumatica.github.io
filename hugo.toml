baseURL = "https://bizumatica.com.br/"
locale = "pt-br" # Corrigido para zerar o WARN do Hugo v0.158.0+
title = "Bizumática"
theme = "terminal"
publishDir = "docs"
enableEmoji = true

# --- HIGIENIZAÇÃO NATIVA CONTRA PÁGINAS FANTASMAS ---
cleanDestinationDir = true

# --- AJUSTES OTIMIZADOS PARA GITHUB PAGES + AMBIENTE LOCAL ---
# Desativamos o canonify e o relative para que o Hugo use caminhos absolutos baseados no host atual (funciona tanto no localhost quanto na web)
canonifyURLs = false
relativeURLs = false
removePathAccents = true

[params]
  themeColor = "orange"
  centerTheme = true
  animatedTheme = true
  favicon = "favicon.png"
  customCSS = ["css/extended.css"]

  [params.Logo]
    logoText = "Bizumática"
    logoHomeLink = "/"
    logoCursorStyle = "block"

  [params.adsense]
    client = "ca-pub-3733806324330520"

# --- PROCESSAMENTO DE IMAGENS ---
[imaging]
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart"

# --- TAXONOMIAS ---
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# --- RENDERIZAÇÃO DE MARKUP (KaTeX Ultra Rápido & HTML) ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true 
    
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

