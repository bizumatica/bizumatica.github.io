<span class="terminal-counter" id="bizu-counter-wrapper" style="display: none;">
  [ VISITAS: <span id="bizu-counter-value">------</span> ]
</span>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Evitar poluir as métricas de produção testando localmente
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        const wrapper = document.getElementById("bizu-counter-wrapper");
        const valueSpan = document.getElementById("bizu-counter-value");
        if (wrapper && valueSpan) {
            valueSpan.innerText = "DEV_MODE";
            valueSpan.style.color = "#ff5555";
            wrapper.style.display = "inline-block";
        }
        return; // Aborta a requisição real
    }

    // 2. Chave estática e higienizada para unificar a contagem e evitar falhas por variação de URL (ex: index.html)
    const counterKey = "bizumatica-main-production";
    const apiEndpoint = `https://hits.seeyoufarm.com/api/count/incr/badge.json?url=${counterKey}`;

    fetch(apiEndpoint)
        .then(response => {
            if (!response.ok) throw new Error("Network response error");
            return response.json();
        })
        .then(data => {
            const valueSpan = document.getElementById("bizu-counter-value");
            
            // Validação dupla do retorno da API (campo numérico puro ou string de texto do badge)
            if (data && data.value !== undefined) {
                valueSpan.innerText = data.value;
            } else if (data && data.text) {
                const count = data.text.match(/\d+/);
                valueSpan.innerText = count ? count[0] : "ONLINE";
            } else {
                valueSpan.innerText = "ONLINE";
            }
            
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        })
        .catch(err => {
            console.error("[Contador Bizumática] Erro na API de persistência:", err);
            const valueSpan = document.getElementById("bizu-counter-value");
            if (valueSpan) {
                valueSpan.innerText = "STANDBY";
                valueSpan.style.color = "#6272a4"; // Cinza Tokyo Night
            }
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        });
});
</script>

<style>
.terminal-counter {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    font-weight: bold;
    color: #ff9e3b; /* Laranja Tokyo Night */
    background: #16161e; /* Fundo oficial Tokyo Night */
    padding: 3px 8px;
    border: 1px dashed #ff9e3b66;
    border-radius: 4px;
    letter-spacing: 0.5px;
    box-shadow: 0 0 10px rgba(255, 158, 59, 0.05);
}
</style>
