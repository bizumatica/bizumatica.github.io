<header class="header">
  <div class="header__inner">
    <div class="header__logo-row" style="display: flex; align-items: center; width: 100%; overflow: hidden;">
      {{- /* Link da Logo apontando para a raiz absoluta */ -}}
      <a href="{{ "/" | relURL }}" style="text-decoration: none; flex-shrink: 0;">
        <div class="logo-box">BIZUMÁTICA</div>
      </a>
      <div class="terminal-bars"></div>
    </div>

    <nav class="menu-nav">
      <ul class="menu__inner">
        {{- /* Adicionada a barra "/" para evitar o erro de URLs grudadas */ -}}
        <li><a href="{{ "/posts/" | relURL }}">[ Linux ]</a></li>
        <li><a href="{{ "/foss/" | relURL }}">[ FOSS ]</a></li>
        <li><a href="{{ "/matematica/" | relURL }}">[ Matemática ]</a></li>
        <li><a href="{{ "/equipamentos/" | relURL }}">[ Curadoria ]</a></li>
        <li><a href="{{ "/shell-scripting/" | relURL }}">[ Shell ]</a></li>
        <li><a href="{{ "/search/" | relURL }}">[ Buscar ]</a></li>
        <li><a href="{{ "/about/" | relURL }}">[ Sobre ]</a></li>
      </ul>
    </nav>
  </div>
</header>

<style>
:root { --theme-color: #EEC35E; }

.logo-box {
    background-color: var(--theme-color) !important;
    color: #000 !important;
    padding: 5px 12px;
    font-weight: bold;
    font-family: monospace;
    display: inline-block;
    text-transform: uppercase;
    margin-right: 10px;
    cursor: pointer;
}

.terminal-bars {
    flex-grow: 1;
    height: 25px;
    background-image: linear-gradient(to right, var(--theme-color) 1px, transparent 1px);
    background-size: 4px 100%;
}

.header__inner {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 20px 0;
}

.menu-nav { margin-top: 25px; width: 100%; }

.menu__inner {
    display: flex;
    flex-wrap: nowrap; /* VALIDAÇÃO 1: Trava a linha única no Desktop, impedindo o Sobre de cair */
    list-style: none;
    padding: 0;
    margin: 0;
    justify-content: space-between; /* Distribui os blocos aproveitando 100% da largura útil */
    gap: 10px 10px; /* VALIDAÇÃO 2: Compactação segura do espaço vazio sem diminuir a fonte */
}

.menu__inner li {
    flex: 0 0 auto; /* Impede que o navegador esmague ou encolha a largura dos links */
}

.menu__inner li a {
    color: var(--theme-color) !important;
    text-decoration: none;
    font-family: monospace;
    font-size: 1.1rem; /* Mantém o tamanho original intacto e legível */
    white-space: nowrap; /* Garante blindagem contra quebras internas do texto do link */
}

.menu__inner li a:hover {
    text-decoration: underline;
    filter: brightness(1.2);
}

/* VALIDAÇÃO 3: Ativa o modo responsivo elástico apenas abaixo de desktops padrão */
@media (max-width: 915px) {
    .menu__inner {
        flex-wrap: wrap; /* Permite a quebra organizada em telas pequenas */
        justify-content: flex-start;
        gap: 12px 15px;
    }
}

@media (max-width: 480px) {
    .menu__inner { gap: 15px; }
    .menu__inner li a { font-size: 1rem; }
}
</style>
