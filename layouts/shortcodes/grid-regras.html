{{- if not (.Page.Scratch.Get "regras-css-loaded") -}}
  {{- .Page.Scratch.Set "regras-css-loaded" true -}}
  <style>
    .custom-grid-regras {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    .custom-card-regra {
      border-radius: 6px;
      border: 1px solid var(--card-color);
      background: color-mix(in srgb, var(--card-color) 5%, transparent);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      max-width: 100%;
      overflow: hidden; /* Garante que nada saia do card */
    }
    .card-regra-header {
      background: color-mix(in srgb, var(--card-color) 15%, transparent);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--card-color) 15%, transparent);
      box-sizing: border-box;
    }
    .card-regra-num {
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      color: var(--card-color);
      font-size: 15px;
      white-space: nowrap;
    }
    .card-regra-title {
      font-weight: bold;
      color: var(--card-color);
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    .card-regra-body {
      padding: 1.25rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text-color, #ddd);
      box-sizing: border-box;
      max-width: 100%;
      overflow-x: auto; /* Se um código for muito longo, a rolagem fica restrita estritamente ao texto interno, sem quebrar o card */
    }
    .card-regra-body p {
      margin: 0 0 1rem 0;
      white-space: normal; /* Força o texto a quebrar linha normalmente */
      word-break: break-word;
    }
    .card-regra-body p:last-child {
      margin-bottom: 0;
    }
    .card-regra-body code {
      font-family: 'Courier New', Courier, monospace;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      color: #fff;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      word-break: break-all;
      white-space: pre-wrap; /* Força códigos longos a quebrarem linha em vez de esticarem a tela */
    }
  </style>
{{- end -}}

<div class="custom-grid-regras">
  {{- .Inner | chomp -}}
</div>
