# ==============================================================================
# CONFIGURAÇÃO CORE DO SITE (GLOBAL)
# ==============================================================================
baseURL = "https://bizumatica.com.br/"
title = "Bizumática"
theme = "terminal"
locale = "pt-br"
enableEmoji = true

# Garante que o Hugo mapeie a pasta static da raiz global para o AdSense/SEO
staticDir = ["static"]

# --- HIGIENIZAÇÃO NATIVA CONTRA PÁGINAS FANTASMAS ---
# Limpa arquivos órfãos antigos da pasta de destino a cada novo build
cleanDestinationDir = true

# --- TRATAMENTO DE URLS E SEO ---
# Mantemos desativados para que o Hugo use caminhos absolutos baseados no host ativo
canonifyURLs = false
relativeURLs = false
removePathAccents = true

# ==============================================================================
# PARÂMETROS DO TEMA (TERMINAL CUSTOMIZADO)
# ==============================================================================
[params]
  themeColor = "orange"
  centerTheme = true
  animatedTheme = true
  favicon = "favicon.png"
  customCSS = ["css/extended.css"]

  [params.Logo]
    logoText = "Bizumática"
    logoHomeLink = "/"
    logoCursorStyle = "block"

  [params.adsense]
    client = "ca-pub-3733806324330520"

# ==============================================================================
# PROCESSAMENTO E OTIMIZAÇÃO DE IMAGENS
# ==============================================================================
[imaging]
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart"

# ==============================================================================
# TAXONOMIAS (ORGANIZAÇÃO DE CONTEÚDO)
# ==============================================================================
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# ==============================================================================
# RENDERIZAÇÃO DE MARKUP (KaTeX Ultra Rápido & HTML SEGURO)
# ==============================================================================
[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Obrigatório para renderizar shortcodes HTML customizados (como o compra.html)
    
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]

