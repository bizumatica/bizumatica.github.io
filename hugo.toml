baseURL = "https://bizumatica.com.br/"
languageCode = "pt-br"
title = "Bizumática"
theme = "terminal"
publishDir = "docs"
enableEmoji = true

# Ajustes de URL para GitHub Pages
canonifyURLs = false
relativeURLs = true
removePathAccents = true

[params]
  themeColor = "orange"
  centerTheme = true
  animatedTheme = true
  favicon = "favicon.png"
  customCSS = ["css/extended.css"]

  [params.Logo]
    logoText = "Bizumática"
    logoHomeLink = "/"
    logoCursorStyle = "block"

# --- BLOCO DE IMAGENS (ESSENCIAL PARA O SHORTCODE) ---
[imaging]
  # Qualidade do processamento de imagem do Hugo
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart" # Foca no conteúdo principal da foto ao cortar

# --- CONFIGURAÇÃO DE TAXONOMIAS ---
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# --- CONFIGURAÇÃO DE MARKUP ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Mantido para permitir HTML nos posts
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]
  
  # Adicionado para facilitar a leitura de tabelas de specs
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# --- MENUS ---
[menu]
  [[menu.main]]
    identifier = "linux"
    name = "Linux"
    url = "/posts"
    weight = 10
  [[menu.main]]
    identifier = "equipamentos"
    name = "Curadoria"
    url = "/equipamentos/"
    weight = 12
  [[menu.main]]
    identifier = "matematica"
    name = "Matemática"
    url = "/matematica"
    weight = 15
  [[menu.main]]
    identifier = "search"
    name = "Buscar"
    url = "/search"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "Sobre"
    url = "/about"
    weight = 25