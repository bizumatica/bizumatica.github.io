{{- /* Guard de Injeção Única: Garante que o CSS seja impresso apenas uma vez na página */ -}}
{{- if not (.Page.Scratch.Get "regras-css-loaded") -}}
  {{- .Page.Scratch.Set "regras-css-loaded" true -}}
  <style>
    .custom-grid-regras {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .custom-card-regra {
      border-radius: 4px;
      border: 1px solid var(--card-color);
      background: color-mix(in srgb, var(--card-color) 5%, transparent);
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      margin-bottom: 1rem;
    }
    .card-regra-header {
      background: color-mix(in srgb, var(--card-color) 20%, transparent);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-regra-num, .card-regra-title {
      font-weight: bold;
      color: var(--card-color);
      text-transform: uppercase;
      font-size: 13px;
    }
    .card-regra-body {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--text-color, #ddd); 
    }
  </style>
{{- end -}}

<div class="custom-grid-regras">
  {{ .Inner }}
</div>
