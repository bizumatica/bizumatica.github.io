baseURL = "https://bizumatica.com.br/"
languageCode = "pt-br"
title = "Bizumática"
theme = "terminal"
publishDir = "docs"
enableEmoji = true

# --- AJUSTES PARA GITHUB PAGES ---
# Mantendo sua configuração original para compatibilidade com o deploy
canonifyURLs = false
relativeURLs = true
removePathAccents = true

[params]
  themeColor = "orange"
  centerTheme = true
  animatedTheme = true
  favicon = "favicon.png"
  # O terminal theme carrega customCSS automaticamente de assets/css/
  customCSS = ["css/extended.css"]

  [params.Logo]
    logoText = "Bizumática"
    logoHomeLink = "/"
    logoCursorStyle = "block"

# --- PROCESSAMENTO DE IMAGENS ---
[imaging]
  resampleFilter = "lanczos"
  quality = 85
  anchor = "smart"

# --- TAXONOMIAS ---
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# --- RENDERIZAÇÃO DE MARKUP (KaTeX & HTML) ---
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # Essencial para renderizar HTML/Shortcodes nos posts
    
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['$$', '$$'], ['\\[', '\\]']]
          inline = [['$', '$'], ['\\(', '\\)']]

  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# --- NAVEGAÇÃO (MENUS) ---
# Estrutura otimizada para o robô do AdSense validar a navegação.
