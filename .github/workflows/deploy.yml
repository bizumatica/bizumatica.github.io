name: Pipeline de Deploy Bizumática (v6.0 - Cloudflare Edge Compiler)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do Código-Fonte Limpo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🛠️ Configurar Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: 🏗️ Compilar Site Estático
        run: hugo --gc --minify --cleanDestinationDir --buildDrafts

      - name: ⚙️ Compliance Check Final (AdSense & SEO)
        run: |
          if [ ! -f "public/ads.txt" ]; then 
            echo "::error::ERRO: ads.txt foi perdido no build da nuvem!" && exit 1
          fi
          grep -q "Allow: /" public/robots.txt || { echo "::warning::Verifique a indexação no robots.txt"; }

      - name: 🟢 Configurar Node.js (Runtime Pagefind)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔍 Indexar Motor de Busca Otimizado (Pagefind)
        run: npx --yes pagefind --site public || echo "Aviso: Sem elementos indexáveis no Pagefind por enquanto."

      - name: 🚀 Deploy Direto no Edge da Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=bizumatica