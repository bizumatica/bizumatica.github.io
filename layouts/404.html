<!DOCTYPE html>
<html lang="pt-br">
{{ partial "head.html" . }}
<body class="terminal">
    <div class="container">
        {{ partial "header.html" . }}
        <main>
            <div class="error-wrapper" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; font-family: monospace; text-align: center;">
                <h1 style="font-size: 6rem; color: #ff5555; margin: 0; line-height: 1;">404</h1>
                <p style="font-size: 1.1rem; color: #EEC35E; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase;">
                    [ FATAL_ERROR: PAGE_MISSING ]
                </p>

                <div style="background: rgba(0,0,0,0.3); padding: 25px; border: 1px solid #222; border-radius: 4px; text-align: left; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <p style="color: #666; margin: 5px 0;">$ query --target "{{ .RelPermalink }}"</p>
                    <p style="color: #ff5555; margin: 5px 0;">> Error: Sector not found or corrupted.</p>
                    <p style="color: #50fa7b; margin: 5px 0;">> Action: Use footer navigation to reboot.</p>
                    <p style="color: #666; margin: 5px 0;">$ _</p>
                </div>

                <p style="margin-top: 30px; color: #444; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;">
                    :: Bizumática v3.6 :: System Halted ::
                </p>
            </div>
        </main>
        {{ partial "footer.html" . }}
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const links = document.querySelectorAll('a');
        links.forEach(link => {
          const href = link.getAttribute('href');
          if (href && !href.startsWith('http') && !href.startsWith('/')) {
            link.setAttribute('href', '/' + href);
          }
        });
      });
    </script>
</body>
</html>
