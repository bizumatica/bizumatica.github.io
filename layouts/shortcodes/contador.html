<span class="terminal-counter" id="bizu-counter-wrapper" style="display: none;">
  [ VISITAS: <span id="bizu-counter-value">------</span> ]
</span>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Evitar poluir as métricas de produção testando localmente
    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
        const wrapper = document.getElementById("bizu-counter-wrapper");
        const valueSpan = document.getElementById("bizu-counter-value");
        if (wrapper && valueSpan) {
            valueSpan.innerText = "DEV_MODE";
            valueSpan.style.color = "#ff5555";
            wrapper.style.display = "inline-block";
        }
        return; // Aborta a requisição real
    }

    // 2. Chaves de identificação únicas e higienizadas baseadas no seu domínio
    const targetUrl = window.location.origin + window.location.pathname;
    // Usamos o serviço alternativo e estável 'api.countapi.io' ou 'hits.seeyoufarm.com' estruturado em JSON
    // Para máxima compatibilidade e uptime em 2026, usamos a API aberta do SCY (Hits Proxy)
    const apiEndpoint = `https://hits.seeyoufarm.com/api/count/incr/badge.json?url=${encodeURIComponent(targetUrl)}`;

    fetch(apiEndpoint)
        .then(response => {
            if (!response.ok) throw new Error("Network response error");
            return response.json();
        })
        .then(data => {
            // O serviço retorna a contagem estruturada ou injetada no value
            // Tratamento regex caso o retorno seja um padrão de badge ou extração direta do valor numérico
            if (data && data.value) {
                document.getElementById("bizu-counter-value").innerText = data.value;
            } else if (data && data.text) {
                // Fallback para APIs que retornam string formatada (ex: "27103")
                const count = data.text.match(/\d+/);
                document.getElementById("bizu-counter-value").innerText = count ? count[0] : "ONLINE";
            }
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        })
        .catch(err => {
            console.error("[Contador Bizumática] Erro na API de persistência:", err);
            // Fallback elegante em modo texto purista de terminal
            const valueSpan = document.getElementById("bizu-counter-value");
            if (valueSpan) {
                valueSpan.innerText = "STANDBY";
                valueSpan.style.color = "#6272a4"; // Cinza Dracula/Tokyo Night
            }
            document.getElementById("bizu-counter-wrapper").style.display = "inline-block";
        });
});
</script>

<style>
.terminal-counter {
    font-family: 'Fira Code', monospace;
    font-size: 0.85rem;
    font-weight: bold;
    color: #ff9e3b; /* Laranja Tokyo Night */
    background: #16161e; /* Fundo oficial Tokyo Night */
    padding: 3px 8px;
    border: 1px dashed #ff9e3b66;
    border-radius: 4px;
    letter-spacing: 0.5px;
    box-shadow: 0 0 10px rgba(255, 158, 59, 0.05);
}
</style>
